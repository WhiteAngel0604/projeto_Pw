<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina de Login</title>
    <link rel="stylesheet" href="cssGlobal.css">
</head>

<body>

    <div id="container">
        <h2>Login Usuario</h2>
        
        <!-- nesse coiso de baixo voce bota php  -->
        <form action="login.php" method="POST">
        
            <div class="grupo">
                <label for="login">E-mail, CPF ou CNPJ:</label>
                <input type="text" id="login" name="identificar" required placeholder="Validar login">
            </div>
            
            <div class="grupo">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="Senha" required placeholder="Digite sua senha">
            </div>
            
            <button type="submit">Entrar</button>
        </form>
        
        <div class="link">
            <p>Não tem uma conta? <a href="Cadastro.html">Faça seu cadastro!</a></p>
        </div>
		
    </div>
	
</body>

</html>
